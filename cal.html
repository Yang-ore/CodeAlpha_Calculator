<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator: Okoh.E.Anointed</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #000000;
            font-family: 'arial gothic', 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif, serif;
        }

        .calculator {
            background: #6b2641;
            padding: 20px;
            border-radius: 12px;
            width: 260px;
            box-shadow: 0 10px 25px rgba(71, 3, 3, 0.3);
        }

        .display {
            width: 100%;
            height: 50px;
            font-size: 24px;
            margin-bottom: 15px;
            padding: 5px 10px;
            text-align: right;
            border-radius: 8px;
            border: none;
            background: #000000;
            color: #fff;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 50px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #3e3e5e;
            color: rgba(255, 255, 255, 0.702);
            transition: background 0.2s;
        }

        button:hover {
            background: #5a5a89;
        }

        .operator {
            background: #6f1d4c;
        }

        .operator:hover {
            background: #875e24;
        }

        .equal {
            background: #207535;
            grid-column: span 2;
        }

        .clear {
            background: #058017;
            grid-column: span 2;
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" class="display" disabled>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendValue('/')">÷</button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>

        <button onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const display = document.getElementById("display");

    function appendValue(value) {
        display.value += value;
    }

    function clearDisplay() {
        display.value = "";
    }

    function calculate() {
        try {
            display.value = eval(display.value);
        } catch {
            display.value = "Error";
        }
    }
</script>

</body>
</html>
